services:
  api:
    build: .
    image: fraudshield-ai
    container_name: fraudshield-api
    ports:
      - "8000:8000"
    environment:
      FRAUDSHIELD_THRESHOLD: "0.5"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      # Point at Postgres in production, e.g.:
      # DATABASE_URL: "postgresql+psycopg://user:pass@db:5432/fraudshield"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: fraudshield-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Kafka in KRaft mode (no separate ZooKeeper needed).
  kafka:
    image: bitnami/kafka:3.7
    container_name: fraudshield-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    restart: unless-stopped
