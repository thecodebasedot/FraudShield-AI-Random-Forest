# EXAMPLE ONLY — do not commit real secrets. Create the real Secret out-of-band:
#
#   kubectl create secret generic fraudshield-secrets \
#     --from-literal=DATABASE_URL='postgresql+psycopg://user:pass@host:5432/fraudshield' \
#     --from-literal=FRAUDSHIELD_ENC_KEY="$(python -m src.security genkey)" \
#     --from-literal=SLACK_WEBHOOK_URL='https://hooks.slack.com/services/...'
#
# This file documents the expected keys; values here are placeholders.
apiVersion: v1
kind: Secret
metadata:
  name: fraudshield-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg://user:CHANGE_ME@db:5432/fraudshield"
  FRAUDSHIELD_ENC_KEY: "CHANGE_ME_generate_with_src.security_genkey"
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/CHANGE/ME"
