apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraudshield-api
  labels:
    app: fraudshield-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraudshield-api
  template:
    metadata:
      labels:
        app: fraudshield-api
    spec:
      containers:
        - name: api
          image: fraudshield-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fraudshield-config
            - secretRef:
                name: fraudshield-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
